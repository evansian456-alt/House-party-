name: Deploy to Railway

on:
  push:
    branches: 
      - main
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        run: npm run db:migrate --if-present
      
      - name: Run tests
        env:
          NODE_ENV: test
          TEST_MODE: "true"
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          ENFORCE_NO_SKIPS: "1"
        run: npm test
        continue-on-error: false
      
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: syncspeaker
        env:
          # Railway automatically injects DATABASE_URL and REDIS_URL
          # These environment variables should be configured in Railway dashboard:
          # - SENTRY_DSN (optional, for error tracking)
          # - GA_MEASUREMENT_ID (optional, for analytics)
          # - NODE_ENV=production
          PORT: 8080
      
      - name: Deployment success notification
        if: success()
        run: |
          echo "✅ Deployment to Railway successful!"
          echo "🎉 Application is now live at your Railway domain"
      
      - name: Deployment failure notification
        if: failure()
        run: |
          echo "❌ Deployment to Railway failed"
          echo "Check the logs above for details"

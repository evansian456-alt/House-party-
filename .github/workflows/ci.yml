name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Enforce zero skipped tests
        run: |
          if grep -rn --exclude-dir=node_modules "describe\.skip\|it\.skip\|test\.skip\|xit(\|xdescribe(" --include="*.test.js" --include="*.spec.js" .; then
            echo "❌ ERROR: Forbidden skip pattern found in test files!"
            echo "   Per RULE 1, all tests must run and pass — never skip."
            exit 1
          fi
          echo "✅ No skipped-test patterns detected."
      
      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        run: npm run db:migrate --if-present
      
      - name: Run unit tests
        env:
          NODE_ENV: test
          TEST_MODE: "true"
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          ENFORCE_NO_SKIPS: "1"
        run: npm test
      
      - name: Generate coverage report
        env:
          NODE_ENV: test
          TEST_MODE: "true"
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          ENFORCE_NO_SKIPS: "1"
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter (if configured)
        run: |
          if grep -q "\"lint\"" package.json; then
            npm run lint
          else
            echo "No linter configured, skipping"
          fi
        continue-on-error: true

  pwa:
    name: PWA Readiness Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run PWA validation
        run: npm run validate:pwa
      
      - name: Run PWA tests
        run: npm test -- pwa-readiness.test.js

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Check for known vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        run: npm run db:migrate --if-present
      
      - name: Boot E2E stack
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-runner-secret-do-not-use-in-production-32chars+
          NODE_ENV: test
          TEST_MODE: "true"
          SERVER_PORT: "34155"
        run: node scripts/ci/e2e-up.js

      - name: Run E2E tests
        env:
          # Pre-started by e2e-up.js — skip the boot sequence in e2e-runner.js
          E2E_SKIP_BOOT: "1"
          BASE_URL: http://localhost:34155
          NODE_ENV: test
          TEST_MODE: "true"
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-runner-secret-do-not-use-in-production-32chars+
          ENFORCE_NO_SKIPS: "1"
        run: npm run test:e2e
      
      - name: Print server log on failure
        if: failure()
        run: |
          if [ -f server.log ]; then
            echo "=== Last 200 lines of server.log ==="
            tail -200 server.log
          else
            echo "No server.log found."
          fi

      - name: Upload server log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-log
          path: server.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
      
      - name: Upload E2E test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop E2E server
        if: always()
        run: |
          # Kill server by PID file written by e2e-up.js (deterministic)
          if [ -f e2e-server.pid ]; then
            PID=$(cat e2e-server.pid)
            echo "[CI] Stopping E2E server PID $PID (SIGTERM)"
            kill -TERM $PID 2>/dev/null || true
            # Wait up to 5 s for graceful exit, then force-kill
            for i in 1 2 3 4 5; do
              kill -0 $PID 2>/dev/null || break
              sleep 1
            done
            kill -9 $PID 2>/dev/null || true
            rm -f e2e-server.pid
          fi
          # Fallback: kill any process still bound to port 34155
          lsof -ti:34155 2>/dev/null | xargs kill -9 2>/dev/null || true
          echo "[CI] E2E server stopped."

  production-config:
    name: Production Configuration Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check .env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo "ERROR: .env.example is missing"
            exit 1
          fi
          echo "✅ .env.example exists"
      
      - name: Check docs/ENVIRONMENT.md exists
        run: |
          if [ ! -f docs/ENVIRONMENT.md ]; then
            echo "ERROR: docs/ENVIRONMENT.md is missing"
            exit 1
          fi
          echo "✅ docs/ENVIRONMENT.md exists"
      
      - name: Check docs/DEPLOYMENT.md exists
        run: |
          if [ ! -f docs/DEPLOYMENT.md ]; then
            echo "ERROR: docs/DEPLOYMENT.md is missing"
            exit 1
          fi
          echo "✅ docs/DEPLOYMENT.md exists"
      
      - name: Check Dockerfile exists
        run: |
          if [ ! -f Dockerfile ]; then
            echo "ERROR: Dockerfile is missing"
            exit 1
          fi
          echo "✅ Dockerfile exists"
      
      - name: Check .env.example has required variables
        run: |
          required_vars=(
            "NODE_ENV"
            "REDIS_URL"
            "DATABASE_URL"
            "JWT_SECRET"
          )
          
          missing=()
          for var in "${required_vars[@]}"; do
            if ! grep -q "^[# ]*${var}" .env.example; then
              missing+=("$var")
            fi
          done
          
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: .env.example is missing required variables:"
            printf '%s\n' "${missing[@]}"
            exit 1
          fi
          
          echo "✅ All required variables present in .env.example"
      
      - name: Check for insecure defaults in .env.example
        run: |
          # Check for actual secrets in .env.example (should only have placeholders)
          if grep -q "sk_live_[a-zA-Z0-9]" .env.example; then
            echo "ERROR: .env.example contains actual Stripe live key"
            exit 1
          fi
          
          if grep -q "whsec_[a-zA-Z0-9]" .env.example; then
            echo "ERROR: .env.example contains actual Stripe webhook secret"
            exit 1
          fi
          
          echo "✅ No actual secrets found in .env.example"
      
      - name: Test production environment validation (should fail)
        run: |
          # Test that env validator rejects missing production config
          export NODE_ENV=production
          
          # This should fail (exit code 1) because required vars are missing
          if node -e "require('./env-validator').validateAndFailFast()" 2>&1; then
            echo "ERROR: Env validator should have failed without required variables"
            exit 1
          fi
          
          echo "✅ Env validator correctly rejects missing production config"
      
      - name: Test production environment validation (should pass)
        run: |
          # Test that env validator accepts valid production config
          export NODE_ENV=production
          export REDIS_URL=redis://localhost:6379
          export DATABASE_URL=postgresql://localhost:5432/test
          export JWT_SECRET=this-is-a-secure-random-secret-for-production-use-at-least-32-characters
          
          # This should pass (exit code 0)
          if ! node -e "require('./env-validator').validateAndFailFast()"; then
            echo "ERROR: Env validator should have passed with valid config"
            exit 1
          fi
          
          echo "✅ Env validator correctly accepts valid production config"
      
      - name: Test insecure JWT_SECRET rejection
        run: |
          # Test that env validator rejects insecure defaults
          export NODE_ENV=production
          export REDIS_URL=redis://localhost:6379
          export DATABASE_URL=postgresql://localhost:5432/test
          export JWT_SECRET=syncspeaker-no-auth-mode
          
          # This should fail because JWT_SECRET is insecure default
          if node -e "require('./env-validator').validateAndFailFast()" 2>&1; then
            echo "ERROR: Env validator should reject insecure JWT_SECRET default"
            exit 1
          fi
          
          echo "✅ Env validator correctly rejects insecure JWT_SECRET"
      
      - name: Run env-validator tests
        run: npm test -- env-validator.test.js
